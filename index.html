<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Project Title</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 40px auto; max-width: 900px; padding: 0 16px; line-height: 1.5; }
    .card { border: 1px solid #e5e5e5; border-radius: 12px; padding: 16px; margin: 16px 0; }
    iframe { width: 100%; aspect-ratio: 16 / 9; border: 0; border-radius: 12px; }
    a.button { display: inline-block; padding: 10px 14px; border-radius: 10px; border: 1px solid #ddd; text-decoration: none; margin-right: 8px; }
  </style>
</head>
<body>
  <h1>My Project Title</h1>
  <p>Short description of what the project is and why it matters.</p>

  <div class="card">
    <h2>Video</h2>
    <!-- Replace VIDEO_ID with your YouTube video ID -->
    <iframe src="https://www.youtube.com/embed/VIDEO_ID" allowfullscreen></iframe>
  </div>

  <div class="card">
    <h2>Links</h2>
    <!-- Replace these URLs -->
    <p>
      <a class="button" href="https://example.com/paper.pdf" target="_blank" rel="noopener">Paper (PDF)</a>
      <a class="button" href="https://github.com/yourname/your-repo" target="_blank" rel="noopener">Code (GitHub)</a>
      <a class="button" href="https://example.com/slides.pdf" target="_blank" rel="noopener">Slides (PDF)</a>
    </p>
  </div>

  <div class="card">
    <h2>Abstract</h2>
    <p>Paste your paper abstract here (or a short summary).</p>
  </div>

  <div class="card">
    <h2>Citation</h2>
    <pre>
Your Name. "My Project Title." 2026.
    </pre>
  </div>
</body>
</html>
